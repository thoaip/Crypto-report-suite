name: BTC Telegram Report

on:
  schedule:
    - cron: '0 1 * * *'    # 08:00 Vietnam (UTC+7) — morning
    - cron: '30 6 * * *'   # 13:30 Vietnam — noon
    - cron: '0 13 * * *'   # 20:00 Vietnam — evening
  workflow_dispatch:        # allow manual run for testing

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - name: Send report
        run: node report.js ${{ github.event.schedule == '0 13 * * *' && 'evening' || github.event.schedule == '30 6 * * *' && 'noon' || 'morning' }}
        env:
          CAS_EXCHANGE: kraken,bitstamp,coinbase,kucoin,gateio,okx,bybit,binance
          CAS_TELEGRAM_TOKEN: ${{ secrets.CAS_TELEGRAM_TOKEN }}
          CAS_TELEGRAM_CHAT_ID: ${{ secrets.CAS_TELEGRAM_CHAT_ID }}
          CAS_SOSOVALUE_KEY: ${{ secrets.CAS_SOSOVALUE_KEY }}
          CAS_FREECRYPTOAPI_KEY: ${{ secrets.CAS_FREECRYPTOAPI_KEY }}
