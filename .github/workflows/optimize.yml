name: Killzone Auto-Optimize

on:
  schedule:
    - cron: '0 1 * * 1'   # every Monday 08:00 Vietnam (01:00 UTC)
  workflow_dispatch:

concurrency:
  group: kz-optimize
  cancel-in-progress: false

jobs:
  optimize:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # commit kz-config.json back
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - name: Optimize killzone params
        run: node kzoptimize.js BTC 1h
        env:
          CAS_EXCHANGE: kraken,bitstamp,coinbase,kucoin,gateio,okx,bybit,binance
          CAS_TELEGRAM_TOKEN: ${{ secrets.CAS_TELEGRAM_TOKEN }}
          CAS_TELEGRAM_CHAT_ID: ${{ secrets.CAS_TELEGRAM_CHAT_ID }}
      - name: Monte Carlo risk self-optimization
        run: node mcoptimize.js BTC 1d
        env:
          CAS_EXCHANGE: kraken,bitstamp,coinbase,kucoin,gateio,okx,bybit,binance
          CAS_TELEGRAM_TOKEN: ${{ secrets.CAS_TELEGRAM_TOKEN }}
          CAS_TELEGRAM_CHAT_ID: ${{ secrets.CAS_TELEGRAM_CHAT_ID }}
      - name: Bot strategy self-optimization (SL/TP grid)
        run: node botoptimize.js BTC
        env:
          CAS_EXCHANGE: okx,bybit,kraken,bitstamp,coinbase,kucoin,gateio,binance
          CAS_TELEGRAM_TOKEN: ${{ secrets.CAS_TELEGRAM_TOKEN }}
          CAS_TELEGRAM_CHAT_ID: ${{ secrets.CAS_TELEGRAM_CHAT_ID }}
      - name: Persist optimized params
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add kz-config.json mc-config.json bot-config.json 2>/dev/null || true
          git commit -m "chore: re-optimize killzone + Monte Carlo + bot strategy params [skip ci]" || echo "no change"
          git push || echo "nothing to push"
